<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer & Bank Management - TaxCalm</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .management-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #4f6ef7;
            border-bottom-color: #4f6ef7;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .header-with-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn-primary, .btn-secondary, .btn-warning, .btn-info, .btn-sm {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #4f6ef7;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a56d4;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #000;
        }
        
        .btn-info {
            background: #17a2b8;
            color: white;
        }
        
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .bank-accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .bank-account-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .account-details p {
            margin: 8px 0;
            color: #666;
        }
        
        .account-balance {
            font-size: 18px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .balance-amount {
            color: #28a745;
            font-weight: bold;
        }
        
        .account-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        .data-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
        
        .data-table td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .bg-success {
            background: #28a745;
            color: white;
        }
        
        .bg-secondary {
            background: #6c757d;
            color: white;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .btn-close {
            background: transparent;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .required {
            color: red;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .detail-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        
        .detail-item strong {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .detail-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
        }
        
        .info-text {
            background: #fff3cd;
            padding: 10px;
            border-radius: 4px;
            color: #856404;
            margin: 10px 0;
        }
        
        .form-hint {
            display: block;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="management-container">
        <h1>Customer & Bank Account Management</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('customers')">👥 Customers</button>
            <button class="tab" onclick="switchTab('banks')">🏦 Bank Accounts</button>
        </div>
        
        <div id="customersTab" class="tab-content active">
            <div class="header-with-action">
                <h2>Customers</h2>
                <button class="btn-primary" onclick="customerManager.showCustomerForm()">
                    ➕ Add Customer
                </button>
            </div>
            <div id="customerList">Loading...</div>
        </div>
        
        <div id="banksTab" class="tab-content">
            <div class="header-with-action">
                <h2>Bank Accounts</h2>
                <button class="btn-primary" onclick="bankAccountManager.showBankAccountForm()">
                    ➕ Add Bank Account
                </button>
            </div>
            <div id="bankAccountList">Loading...</div>
        </div>
    </div>
    
    <script src="/static/js/customer-bank-manager.js"></script>
    <script>
        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tab === 'customers') {
                document.getElementById('customersTab').classList.add('active');
            } else if (tab === 'banks') {
                document.getElementById('banksTab').classList.add('active');
            }
        }
        
        // Load data on page load
        window.addEventListener('DOMContentLoaded', () => {
            customerManager.loadCustomers();
            bankAccountManager.loadBankAccounts();
        });
    </script>
</body>
</html>
