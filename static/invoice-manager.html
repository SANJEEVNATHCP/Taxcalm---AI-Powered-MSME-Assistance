<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Management - TaxCalm</title>
   <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .form-input {
            @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500;
        }
        .btn-primary {
            @apply px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition;
        }
        .btn-success {
            @apply px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition;
        }
        .modal {
            @apply fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4;
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Header -->
    <div class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Invoice Management</h1>
                    <p class="text-sm text-gray-500 mt-1">Manage GST-compliant invoices</p>
                </div>
                <div class="flex space-x-3">
                    <button id="refreshInvoicesBtn" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition">
                        <svg class="w-5 h-5 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Refresh
                    </button>
                    <button id="createInvoiceBtn" class="btn-primary">
                        <svg class="w-5 h-5 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Create Invoice
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Filters -->
    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="bg-white rounded-lg shadow-sm p-4 mb-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                    <input id="searchInvoice" type="text" placeholder="Invoice # or customer" class="form-input">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Invoice Status</label>
                    <select id="statusFilter" class="form-input">
                        <option value="">All Statuses</option>
                        <option value="Draft">Draft</option>
                        <option value="Sent">Sent</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Payment Status</label>
                    <select id="paymentStatusFilter" class="form-input">
                        <option value="">All Payments</option>
                        <option value="Unpaid">Unpaid</option>
                        <option value="PartiallyPaid">Partially Paid</option>
                        <option value="Paid">Paid</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Invoice List -->
    <div class="max-w-7xl mx-auto px-4 pb-8">
        <div class="bg-white rounded-lg shadow-sm">
            <div id="invoiceList" class="min-h-96">
                <div class="text-center py-12 text-gray-500">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                    <p class="mt-4">Loading invoices...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Invoice Form Modal -->
    <div id="invoiceFormModal" class="modal hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full max-h-screen overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center z-10">
                <h2 class="text-xl font-bold text-gray-900">Create Invoice</h2>
                <button onclick="invoiceManager.hideInvoiceForm()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <form id="invoiceForm" class="p-6">
                <!-- Basic Details -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Invoice Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Customer *</label>
                            <select id="customerId" class="form-input" required>
                                <option value="">Select Customer</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Bank Account</label>
                            <select id="bankAccountId" class="form-input">
                                <option value="">Select Bank Account</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Invoice Date *</label>
                            <input id="invoiceDate" type="date" class="form-input" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Due Date *</label>
                            <input id="dueDate" type="date" class="form-input" required>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Billing Address</label>
                            <textarea id="billingAddress" class="form-input" rows="2" placeholder="Customer billing address"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- Items Section -->
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">Invoice Items</h3>
                        <button id="addItemBtn" type="button" class="btn-primary text-sm">
                            <svg class="w-4 h-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            Add Item
                        </button>
                    </div>
                    <div id="invoiceItemsContainer" class="space-y-3">
                        <!-- Items will be added dynamically -->
                    </div>
                </div>
                
                <!-- Summary -->
                <div class="mb-6 bg-gray-50 p-4 rounded-lg">
                    <h3 class="text-lg font-semibold text-gray-900 mb-3">Invoice Summary</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Subtotal:</span>
                            <span id="summarySubtotal" class="font-medium text-gray-900">₹0.00</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">Discount:</span>
                            <span id="summaryDiscount" class="font-medium text-gray-900">₹0.00</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">Total Tax (GST):</span>
                            <span id="summaryTax" class="font-medium text-gray-900">₹0.00</span>
                        </div>
                        <div class="flex justify-between pt-2 border-t border-gray-300">
                            <span class="font-bold text-gray-900">Grand Total:</span>
                            <span id="summaryGrandTotal" class="font-bold text-lg text-gray-900">₹0.00</span>
                        </div>
                    </div>
                </div>
                
                <!-- Additional Info -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Additional Information</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                            <textarea id="invoiceNotes" class="form-input" rows="2" 
                                      placeholder="Internal notes (not visible on invoice)"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Terms & Conditions</label>
                            <textarea id="termsConditions" class="form-input" rows="3" 
                                      placeholder="Payment terms and conditions (visible on invoice)"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- Actions -->
                <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
                    <button type="button" id="cancelInvoiceBtn" class="px-6 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition">
                        Cancel
                    </button>
                    <button type="button" id="saveInvoiceBtn" class="btn-primary px-6 py-2">
                        Create Invoice
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Invoice Details Modal -->
    <div id="invoiceDetailsModal" class="modal hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-screen overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center z-10">
                <h2 class="text-xl font-bold text-gray-900">Invoice Details</h2>
                <button onclick="document.getElementById('invoiceDetailsModal').classList.add('hidden')" 
                        class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="invoiceDetailsContent" class="p-6">
                <!-- Details loaded dynamically -->
            </div>
        </div>
    </div>
    
    <!-- Payment Modal -->
    <div id="paymentModal" class="modal hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="bg-green-50 border-b border-green-200 px-6 py-4 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-900">Record Payment</h2>
                <button onclick="invoiceManager.hidePaymentModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div class="p-6">
                <div class="mb-4 bg-gray-50 p-3 rounded">
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-600">Invoice:</span>
                        <span id="paymentInvoiceNumber" class="font-semibold text-gray-900"></span>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-sm text-gray-600">Balance Due:</span>
                        <span id="paymentBalanceDue" class="font-bold text-lg text-orange-600"></span>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Payment Date *</label>
                        <input id="paymentDate" type="date" class="form-input" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Payment Amount *</label>
                        <input id="paymentAmount" type="number" class="form-input" min="0" step="0.01" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Payment Mode *</label>
                        <select id="paymentMode" class="form-input" required>
                            <option value="Cash">Cash</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="UPI">UPI</option>
                            <option value="Cheque">Cheque</option>
                            <option value="Card">Card</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Bank Account</label>
                        <select id="paymentBankAccount" class="form-input">
                            <option value="">Select Bank Account</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Reference Number</label>
                        <input id="paymentReference" type="text" class="form-input" placeholder="Transaction/UTR/Cheque number">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                        <textarea id="paymentNotes" class="form-input" rows="2" placeholder="Payment notes"></textarea>
                    </div>
                </div>
                
                <div class="flex justify-end space-x-3 mt-6 pt-4 border-t border-gray-200">
                    <button id="cancelPaymentBtn" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition">
                        Cancel
                    </button>
                    <button id="savePaymentBtn" class="btn-success px-4 py-2">
                        Record Payment
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/invoice-manager.js"></script>
</body>
</html>
