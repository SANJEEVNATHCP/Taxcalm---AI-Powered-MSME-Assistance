<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent Diagnostic - TaxCalm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-ok { color: #10b981; }
        .status-error { color: #ef4444; }
        .status-warning { color: #f59e0b; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="card rounded-2xl p-8 mb-6">
            <h1 class="text-3xl font-bold text-white mb-2">🔍 TaxCalm Voice Agent Diagnostic</h1>
            <p class="textgray-400">Testing voice agent functionality and identifying issues</p>
        </div>

        <div class="card rounded-2xl p-6 mb-4">
            <h2 class="text-xl font-bold text-white mb-4">Browser Support</h2>
            <div id="browserSupport" class="space-y-2 text-sm"></div>
        </div>

        <div class="card rounded-2xl p-6 mb-4">
            <h2 class="text-xl font-bold text-white mb-4">Microphone Permission</h2>
            <div id="microphoneStatus" class="space-y-2 text-sm mb-4"></div>
            <button id="requestPermission" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition">
                Request Microphone Permission
            </button>
        </div>

        <div class="card rounded-2xl p-6 mb-4">
            <h2 class="text-xl font-bold text-white mb-4">Speech Recognition Test</h2>
            <div id="recognitionStatus" class="space-y-2 text-sm mb-4"></div>
            <div class="flex gap-4">
                <button id="testSpeech" class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold transition">
                    🎤 Start Speech Test
                </button>
                <button id="stopSpeech" class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold transition" disabled>
                    ⏹️ Stop
                </button>
            </div>
            <div id="transcript" class="mt-4 p-4 bg-black bg-opacity-30 rounded-lg text-white min-h-20"></div>
        </div>

        <div class="card rounded-2xl p-6 mb-4">
            <h2 class="text-xl font-bold text-white mb-4">Text-to-Speech Test</h2>
            <div id="ttsStatus" class="space-y-2 text-sm mb-4"></div>
            <button id="testTTS" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-semibold transition">
                🔊 Test Text-to-Speech
            </button>
        </div>

        <div class="card rounded-2xl p-6">
            <h2 class="text-xl font-bold text-white mb-4">Console Log</h2>
            <div id="consoleLog" class="p-4 bg-black bg-opacity-50 rounded-lg text-green-400 font-mono text-xs max-h-60 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let recognition = null;
        let isListening = false;

        // Console logger
        function log(message, type = 'info') {
            const consoleLog = document.getElementById('consoleLog');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : type === 'warning' ? 'text-yellow-400' : 'text-white';
            consoleLog.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
            console.log(message);
        }

        // Check browser support
        function checkBrowserSupport() {
            const div = document.getElementById('browserSupport');
            let html = '';

            // Speech Recognition
            const hasRecognition = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
            html += `<div class="${hasRecognition ? 'status-ok' : 'status-error'}">
                ${hasRecognition ? '✅' : '❌'} Speech Recognition API
            </div>`;
            log(`Speech Recognition: ${hasRecognition ? 'Supported' : 'Not Supported'}`, hasRecognition ? 'success' : 'error');

            // Speech Synthesis
            const hasSynthesis = 'speechSynthesis' in window;
            html += `<div class="${hasSynthesis ? 'status-ok' : 'status-error'}">
                ${hasSynthesis ? '✅' : '❌'} Speech Synthesis API
            </div>`;
            log(`Speech Synthesis: ${hasSynthesis ? 'Supported' : 'Not Supported'}`, hasSynthesis ? 'success' : 'error');

            // MediaDevices
            const hasMediaDevices = navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
            html += `<div class="${hasMediaDevices ? 'status-ok' : 'status-error'}">
                ${hasMediaDevices ? '✅' : '❌'} MediaDevices API (getUserMedia)
            </div>`;
            log(`MediaDevices: ${hasMediaDevices ? 'Supported' : 'Not Supported'}`, hasMediaDevices ? 'success' : 'error');

            // Browser info
            html += `<div class="text-gray-400 mt-2">
                Browser: ${navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge)\/[\d\.]+/)?.[0] || 'Unknown'}
            </div>`;

            div.innerHTML = html;
        }

        // Check microphone permission
        async function checkMicrophonePermission() {
            const div = document.getElementById('microphoneStatus');
            
            try {
                const result = await navigator.permissions.query({ name: 'microphone' });
                log(`Microphone permission state: ${result.state}`, result.state === 'granted' ? 'success' : 'warning');
                
                div.innerHTML = `
                    <div class="${result.state === 'granted' ? 'status-ok' : result.state === 'denied' ? 'status-error' : 'status-warning'}">
                        ${result.state === 'granted' ? '✅' : result.state === 'denied' ? '❌' : '⚠️'} 
                        Permission: ${result.state.toUpperCase()}
                    </div>
                `;

                result.onchange = () => {
                    log(`Permission changed to: ${result.state}`, 'info');
                    checkMicrophonePermission();
                };
            } catch (error) {
                log(`Permission API error: ${error.message}`, 'warning');
                div.innerHTML = `<div class="text-gray-400">⚠️ Permission API not available - will check on use</div>`;
            }
        }

        // Request microphone permission
        document.getElementById('requestPermission').addEventListener('click', async () => {
            log('Requesting microphone permission...', 'info');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log('✅ Microphone permission granted!', 'success');
                stream.getTracks().forEach(track => track.stop());
                checkMicrophonePermission();
            } catch (error) {
                log(`❌ Permission denied: ${error.message}`, 'error');
            }
        });

        // Test speech recognition
        document.getElementById('testSpeech').addEventListener('click', () => {
            if (isListening) return;

            log('Starting speech recognition...', 'info');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                log('❌ Speech Recognition not supported!', 'error');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                log('🎤 Listening started...', 'success');
                document.getElementById('testSpeech').disabled = true;
                document.getElementById('stopSpeech').disabled = false;
                document.getElementById('transcript').innerHTML = '<p class="text-yellow-300">🎤 Listening... Speak now!</p>';
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript;
                const isFinal = event.results[event.results.length - 1].isFinal;
                
                document.getElementById('transcript').innerHTML = `
                    <p class="${isFinal ? 'text-green-300' : 'text-gray-400'}">
                        ${isFinal ? '📝' : '...'} ${transcript}
                    </p>
                `;
                
                if (isFinal) {
                    log(`Recognized: "${transcript}"`, 'success');
                }
            };

            recognition.onerror = (event) => {
                log(`❌ Recognition error: ${event.error}`, 'error');
                document.getElementById('transcript').innerHTML = `<p class="text-red-400">❌ Error: ${event.error}</p>`;
                isListening = false;
                document.getElementById('testSpeech').disabled = false;
                document.getElementById('stopSpeech').disabled = true;
            };

            recognition.onend = () => {
                log('Recognition ended', 'info');
                isListening = false;
                document.getElementById('testSpeech').disabled = false;
                document.getElementById('stopSpeech').disabled = true;
            };

            try {
                recognition.start();
            } catch (error) {
                log(`❌ Failed to start: ${error.message}`, 'error');
            }
        });

        document.getElementById('stopSpeech').addEventListener('click', () => {
            if (recognition && isListening) {
                recognition.stop();
                log('Stopping recognition...', 'info');
            }
        });

        // Test text-to-speech
        document.getElementById('testTTS').addEventListener('click', () => {
            if ('speechSynthesis' in window) {
                log('Testing text-to-speech...', 'info');
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance('Hello! This is a text to speech test. If you can hear this, speech synthesis is working correctly.');
                utterance.rate = 0.9;
                utterance.pitch = 1;
                
                utterance.onstart = () => log('🔊 Speaking...', 'info');
                utterance.onend = () => log('✅ Speech completed', 'success');
                utterance.onerror = (event) => log(`❌ TTS error: ${event.error}`, 'error');
                
                speechSynthesis.speak(utterance);
            } else {
                log('❌ Text-to-speech not supported!', 'error');
            }
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            log('=== TaxCalm Voice Diagnostic Started ===', 'info');
            checkBrowserSupport();
            checkMicrophonePermission();
        });
    </script>
</body>
</html>
